<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body{font-family:sans-serif;padding:1rem;max-width:820px;margin:0 auto;}
.drop-zone{border:1.5px dashed #bbb;border-radius:12px;padding:2rem;text-align:center;cursor:pointer;background:#f8f8f8;transition:background .15s;}
.drop-zone:hover,.drop-zone.drag-over{background:#f0f0f0;border-color:#888;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;white-space:nowrap;}
.badge-acct{background:#FAEEDA;color:#854F0B;}
.badge-dup{background:#FCEBEB;color:#A32D2D;}
.badge-tax{background:#E6F1FB;color:#185FA5;}
.badge-ok{background:#EAF3DE;color:#3B6D11;}
.badge-imp{background:#EEEDFE;color:#3C3489;}
.badge-amt{background:#FEF3C7;color:#92400E;}
.badge-memo{background:#F3F4F6;color:#374151;}
.badge-large{background:#FEE2E2;color:#991B1B;}
.issue-row{border-bottom:0.5px solid #e5e5e5;padding:10px 0;font-size:13px;}
.issue-row:last-child{border-bottom:none;}
.tab-btn{padding:5px 12px;font-size:12px;border:0.5px solid #ccc;border-radius:8px;background:transparent;cursor:pointer;transition:all .15s;}
.tab-btn:hover{background:#f5f5f5;}
.tab-btn.active{background:#fff;font-weight:500;border-color:#666;}
.stat-card{background:#f7f7f7;border-radius:8px;padding:10px 12px;flex:1;min-width:56px;text-align:center;}
.setting-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem;}
.radio-label{display:inline-flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:5px 11px;border:0.5px solid #ddd;border-radius:8px;margin:3px;transition:all .15s;}
.radio-label:hover{background:#f5f5f5;}
.radio-label:has(input:checked){border-color:#666;background:#f0f0f0;}
.hint-line{font-size:12px;color:#555;margin-top:3px;padding-left:4px;}
.section-title{font-size:13px;font-weight:600;margin-bottom:6px;color:#222;}
</style>
</head><body>

<div id="setup-section">
  <div class="setting-card">
    <div class="section-title">CSVの形式</div>
    <label class="radio-label"><input type="radio" name="csvformat" value="twoline" checked> 借方・貸方が別行（標準形式）</label>
    <label class="radio-label"><input type="radio" name="csvformat" value="oneline"> 1行に借方・貸方が含まれる</label>
  </div>
  <div class="setting-card">
    <div class="section-title">事業者区分</div>
    <label class="radio-label"><input type="radio" name="taxtype" value="taxable" checked> 課税事業者</label>
    <label class="radio-label"><input type="radio" name="taxtype" value="exempt"> 免税事業者</label>
    <label class="radio-label"><input type="radio" name="taxtype" value="both"> 両方</label>
  </div>
  <div class="setting-card" id="invoice-setting">
    <div class="section-title">インボイス登録</div>
    <label class="radio-label"><input type="radio" name="invoice" value="registered" checked> 登録あり（T番号取得済み）</label>
    <label class="radio-label"><input type="radio" name="invoice" value="none"> 登録なし</label>
  </div>
  <div class="setting-card">
    <div class="section-title">取引の種類</div>
    <label class="radio-label"><input type="checkbox" name="biz" value="domestic" checked> 国内取引</label>
    <label class="radio-label"><input type="checkbox" name="biz" value="export"> 輸出取引あり</label>
    <label class="radio-label"><input type="checkbox" name="biz" value="import"> 輸入取引あり</label>
  </div>
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div style="font-size:28px;margin-bottom:6px;">&#128196;</div>
    <p style="font-weight:600;margin:0 0 4px;font-size:14px;">CSVをドロップまたはクリックして選択</p>
    <p style="font-size:12px;color:#888;margin:0;">マネーフォワード 仕訳帳エクスポートCSV</p>
  </div>
  <input type="file" id="file-input" accept=".csv" style="display:none">
  <div style="margin-top:10px;text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <button class="tab-btn" onclick="loadSample('taxable')">課税事業者サンプル</button>
    <button class="tab-btn" onclick="loadSample('exempt')">免税事業者サンプル</button>
    <button class="tab-btn" onclick="loadSample('import')">輸入取引サンプル</button>
  </div>
</div>

<div id="result-section" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:6px;">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="font-weight:600;font-size:13px;" id="filename-label"></span>
      <span id="mode-badge"></span>
    </div>
    <button class="tab-btn" onclick="reset()">&#8635; やり直す</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;">
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">仕訳件数</div><div style="font-size:20px;font-weight:600;" id="stat-total">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">科目</div><div style="font-size:20px;font-weight:600;color:#854F0B;" id="stat-acct">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">税区分</div><div style="font-size:20px;font-weight:600;color:#185FA5;" id="stat-tax">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">輸出入</div><div style="font-size:20px;font-weight:600;color:#3C3489;" id="stat-imp">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">金額異常</div><div style="font-size:20px;font-weight:600;color:#92400E;" id="stat-amt">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">摘要不備</div><div style="font-size:20px;font-weight:600;color:#374151;" id="stat-memo">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">高額経費</div><div style="font-size:20px;font-weight:600;color:#991B1B;" id="stat-large">-</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#888;margin-bottom:3px;">重複疑い</div><div style="font-size:20px;font-weight:600;color:#A32D2D;" id="stat-dup">-</div></div>
  </div>
  <div style="display:flex;gap:5px;margin-bottom:0.8rem;flex-wrap:wrap;">
    <button class="tab-btn active" id="tab-all" onclick="showTab('all')">すべての指摘</button>
    <button class="tab-btn" id="tab-acct" onclick="showTab('acct')">科目</button>
    <button class="tab-btn" id="tab-tax" onclick="showTab('tax')">税区分</button>
    <button class="tab-btn" id="tab-imp" onclick="showTab('imp')">輸出入</button>
    <button class="tab-btn" id="tab-amt" onclick="showTab('amt')">金額異常</button>
    <button class="tab-btn" id="tab-memo" onclick="showTab('memo')">摘要不備</button>
    <button class="tab-btn" id="tab-large" onclick="showTab('large')">高額経費</button>
    <button class="tab-btn" id="tab-dup" onclick="showTab('dup')">重複</button>
    <button class="tab-btn" id="tab-ok" onclick="showTab('ok')">問題なし</button>
  </div>
  <div id="issue-list" style="border:0.5px solid #e0e0e0;border-radius:12px;padding:0 14px;max-height:420px;overflow-y:auto;"></div>
  <div style="margin-top:10px;text-align:right;">
    <button class="tab-btn" onclick="exportCSV()">&#11015; 結果をCSVで出力</button>
  </div>
</div>

<script>
const ACCT_RULES=[
  {pattern:/交際費/,keywords:['ランチ','飲食','接待','会食'],alt:'会議費',hint:'少額・社内利用は会議費の可能性あり'},
  {pattern:/消耗品費/,amountThreshold:100000,alt:'工具器具備品',hint:'10万円以上は固定資産（備品）検討を'},
  {pattern:/修繕費/,keywords:['新設','増築','追加'],alt:'資本的支出',hint:'価値向上は資本的支出の可能性あり'},
  {pattern:/地代家賃/,keywords:['駐車場','駐車'],alt:'車両費',hint:'駐車場は車両費で処理する場合もあり'},
  {pattern:/福利厚生費/,keywords:['特定','役員'],alt:'役員報酬・給与',hint:'特定個人向けは給与等の可能性あり'},
  {pattern:/雑費/,amountThreshold:50000,alt:'適切な科目',hint:'高額な雑費は科目の見直しを推奨'},
];

// 高額経費チェック対象科目（10万円以上）
const EXPENSE_ACCTS=[/交際費/,/会議費/,/消耗品費/,/修繕費/,/広告宣伝費/,/通信費/,/旅費交通費/,/雑費/,/福利厚生費/,/新聞図書費/,/荷造運賃/];

// 摘要が不十分なパターン
const MEMO_NG=[/^$/,/^[\s\u3000]+$/,/^[0-9]+$/,/^[-\u30FC\u2015]+$/,/^(なし|無し|不明|その他|摘要なし|備考なし)$/i];

const NONTAX_ACCTS=[/給与/,/賃金/,/役員報酬/,/租税公課/,/印紙/,/受取利息/,/支払利息/,/保険料/,/生命保険/,/社会保険/];
const TAXABLE_PURCHASE=[/交際費/,/会議費/,/消耗品/,/修繕/,/広告/,/通信費/,/旅費/,/外注/,/業務委託/,/荷造/];
const EXPORT_KW=[/輸出/,/海外売上/,/export/i];
const IMPORT_KW=[/輸入/,/関税/,/輸入消費税/,/通関/,/輸入諸掛/];
const IMPORT_ACCTS=[/仕入/,/原材料/,/商品/,/外注/,/輸入/];

const BADGE_MAP={
  acct:'<span class="badge badge-acct">科目確認</span>',
  tax:'<span class="badge badge-tax">税区分確認</span>',
  imp:'<span class="badge badge-imp">輸出入確認</span>',
  amt:'<span class="badge badge-amt">金額異常</span>',
  memo:'<span class="badge badge-memo">摘要不備</span>',
  large:'<span class="badge badge-large">高額経費</span>',
  dup:'<span class="badge badge-dup">重複疑い</span>',
};
const LABEL_MAP={acct:'科目確認',tax:'税区分確認',imp:'輸出入確認',amt:'金額異常',memo:'摘要不備',large:'高額経費',dup:'重複疑い'};
const ALL_TYPES=['acct','tax','imp','amt','memo','large','dup'];

function getBizFlags(){const f={};document.querySelectorAll('input[name="biz"]:checked').forEach(c=>f[c.value]=true);return f;}
function getAmt(r){return parseInt((r['借方金額']||r['金額']||r['貸方金額']||'0').replace(/[^0-9]/g,''))||0;}
function getMemo(r){return(r['摘要']||r['取引先']||'').trim();}
function getAcct(r){return r['勘定科目']||r['借方科目']||r['貸方科目']||'';}

function buildDupMap(rows){
  const dupMap={};
  const first=rows[0]||{};
  const amtKey='借方金額' in first?'借方金額':'金額' in first?'金額':'貸方金額';
  const keyMap={};
  rows.forEach(r=>{
    const date=r['日付']||r['取引日']||'';
    const amt=r[amtKey]||r['借方金額']||r['貸方金額']||r['金額']||'';
    if(!date||!amt||amt==='0')return;
    const key=date+'|'+amt;
    if(!keyMap[key])keyMap[key]=[];
    keyMap[key].push(r._row);
  });
  Object.entries(keyMap).forEach(([,rns])=>{if(rns.length>=2)rns.forEach(rn=>dupMap[rn]=rns);});
  return dupMap;
}

function buildAmtStats(rows){
  const map={};
  rows.forEach(r=>{
    const acct=getAcct(r);const amt=getAmt(r);
    if(!acct||amt<=0)return;
    if(!map[acct])map[acct]=[];
    map[acct].push(amt);
  });
  const stats={};
  Object.entries(map).forEach(([acct,amts])=>{
    if(amts.length<4)return; // 4件以上ある科目のみ統計対象
    const s=[...amts].sort((a,b)=>a-b);
    const n=s.length;
    const median=n%2===0?(s[n/2-1]+s[n/2])/2:s[Math.floor(n/2)];
    const q1=s[Math.floor(n/4)];
    const q3=s[Math.floor(3*n/4)];
    const iqr=q3-q1;
    if(iqr===0)return;
    stats[acct]={median,q1,q3,iqr};
  });
  return stats;
}

function checkAmt(r,amtStats){
  const acct=getAcct(r);const amt=getAmt(r);
  const s=amtStats[acct];
  if(!s||amt<=0)return null;
  if(amt>s.q3+3*s.iqr)
    return{type:'amt',hint:acct+'の金額が通常より突出して高い（同科目の中央値：'+Math.round(s.median).toLocaleString()+'円）'};
  if(amt<s.q1-3*s.iqr&&s.q1-3*s.iqr>0)
    return{type:'amt',hint:acct+'の金額が通常より突出して低い（同科目の中央値：'+Math.round(s.median).toLocaleString()+'円）'};
  return null;
}

function checkMemo(r){
  const memo=getMemo(r);
  if(!getAcct(r))return null;
  if(MEMO_NG.some(p=>p.test(memo)))
    return{type:'memo',hint:'摘要が空または不十分。取引内容・相手先を記載してください'};
  if(memo.replace(/[0-9\s\u3000\-]/g,'').length<2)
    return{type:'memo',hint:'摘要の記載が短すぎます。取引内容がわかるよう記載を'};
  return null;
}

function checkLargeExpense(r){
  const acct=getAcct(r);const amt=getAmt(r);
  if(EXPENSE_ACCTS.some(p=>p.test(acct))&&amt>=100000)
    return{type:'large',hint:'経費科目（'+acct+'）に'+amt.toLocaleString()+'円の計上。内容・領収書の確認を'};
  return null;
}

function checkTax(r,taxtype,invoice,biz){
  const issues=[];
  const acct=getAcct(r);
  const tc=(r['税区分']||r['消費税区分']||r['税コード']||'').trim();
  const memo=getMemo(r);const amt=getAmt(r);
  if(!tc)return issues;
  const isTaxPurchase=/課税仕入|仕入税額/.test(tc);
  const isTaxSale=/課税売上/.test(tc);
  const isNonTax=/不課税|対象外/.test(tc);
  const isExportExempt=/輸出免税|輸出/.test(tc);
  const isImportTax=/輸入消費税|特定仕入|特定課税/.test(tc);
  if(taxtype==='exempt'){
    if(isTaxPurchase)issues.push({type:'tax',hint:'免税事業者は仕入税額控除不可。「不課税」または「対象外」に修正を'});
    return issues;
  }
  if(NONTAX_ACCTS.some(p=>p.test(acct))&&isTaxPurchase)
    issues.push({type:'tax',hint:acct+'は不課税取引。「不課税」または「対象外」が正しい可能性あり'});
  if(TAXABLE_PURCHASE.some(p=>p.test(acct))&&isNonTax)
    issues.push({type:'tax',hint:acct+'は通常課税仕入。税区分「'+tc+'」の設定を再確認'});
  if(invoice==='none'&&isTaxPurchase)
    issues.push({type:'tax',hint:'インボイス未登録取引先の場合、経過措置（80%控除等）の区分を確認'});
  if(biz.export){
    if(EXPORT_KW.some(p=>p.test(memo))&&isTaxSale)
      issues.push({type:'imp',hint:'輸出取引は輸出免税（税率0%）。税区分「輸出免税」の適用を確認'});
    if(isExportExempt&&!EXPORT_KW.some(p=>p.test(memo)))
      issues.push({type:'imp',hint:'輸出免税の税区分だが摘要に輸出関連の記載がありません'});
  }
  if(biz.import){
    const isIM=IMPORT_KW.some(p=>p.test(memo));
    const isIA=IMPORT_ACCTS.some(p=>p.test(acct));
    if(isIM&&isTaxPurchase&&!isImportTax)issues.push({type:'imp',hint:'輸入取引の消費税は「輸入消費税」区分で処理。通常の課税仕入と区別が必要'});
    if(isImportTax&&!isIM)issues.push({type:'imp',hint:'輸入消費税の税区分だが摘要に輸入関連の記載なし。内容を確認'});
    if(isIM&&isIA&&amt>=500000&&!isImportTax)issues.push({type:'imp',hint:'高額輸入仕入。関税・輸入消費税の別仕訳が計上されているか確認を'});
    if(/リバース|特定役務|電気通信/.test(memo)&&!isImportTax)issues.push({type:'imp',hint:'国外からの電気通信役務等はリバースチャージ方式（特定課税仕入）が必要な場合あり'});
  }
  return issues;
}

function parseCSV(text){
  const clean=text.replace(/^\uFEFF/,'');
  const lines=clean.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map((line,i)=>{
    const vals=splitLine(line);
    const obj={_row:i+2};
    headers.forEach((h,j)=>{obj[h]=(vals[j]||'').replace(/"/g,'').trim();});
    return obj;
  });
}
function splitLine(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    if(l[i]==='"'){q=!q;}else if(l[i]===','&&!q){r.push(c);c='';}else c+=l[i];
  }
  r.push(c);return r;
}

function detectIssues(rows,cfg){
  const dupMap=buildDupMap(rows);
  const amtStats=buildAmtStats(rows);
  return rows.map(r=>{
    const issues=[];
    const acct=getAcct(r);const memo=getMemo(r);const amt=getAmt(r);
    // 1. 勘定科目
    ACCT_RULES.forEach(rule=>{
      if(rule.pattern.test(acct)){
        let m=false;
        if(rule.keywords&&rule.keywords.some(k=>memo.includes(k)))m=true;
        if(rule.amountThreshold&&amt>=rule.amountThreshold)m=true;
        if(m)issues.push({type:'acct',hint:rule.hint,alt:rule.alt||''});
      }
    });
    // 2. 税区分
    const taxTypes=cfg.taxtype==='both'?['taxable','exempt']:[cfg.taxtype];
    const seen=new Set();
    taxTypes.forEach(t=>{
      checkTax(r,t,cfg.invoice,cfg.biz).forEach(i=>{
        if(!seen.has(i.hint)){seen.add(i.hint);issues.push(i);}
      });
    });
    // 3. 金額異常
    const ai=checkAmt(r,amtStats);if(ai)issues.push(ai);
    // 4. 摘要不十分
    const mi=checkMemo(r);if(mi)issues.push(mi);
    // 5. 高額経費
    const li=checkLargeExpense(r);if(li)issues.push(li);
    // 6. 重複
    if(dupMap[r._row])issues.push({type:'dup',hint:'行'+dupMap[r._row].join(', ')+'と同日・同金額の仕訳あり'});
    return{...r,issues};
  });
}

let allRows=[];let currentTab='all';let currentCfg={};

function renderList(rows){
  const list=document.getElementById('issue-list');
  const filtered=rows.filter(r=>{
    if(currentTab==='all')return r.issues.length>0;
    if(currentTab==='ok')return r.issues.length===0;
    return r.issues.some(i=>i.type===currentTab);
  });
  if(filtered.length===0){
    list.innerHTML='<div style="padding:1.5rem;text-align:center;color:#888;font-size:13px;">該当する指摘事項はありません &#10003;</div>';
    return;
  }
  list.innerHTML=filtered.map(r=>{
    const acct=r['借方科目']||r['勘定科目']||'-';
    const credit=r['貸方科目']||'';
    const date=r['日付']||r['取引日']||'-';
    const memo=r['摘要']||r['取引先']||'-';
    const amt=getAmt(r);
    const amtStr=amt>0?amt.toLocaleString()+'円':'-';
    const tc=r['税区分']||r['消費税区分']||'';
    const acctStr=acct+(credit&&credit!==acct?' / '+credit:'');
    const badges=currentTab==='ok'
      ?'<span class="badge badge-ok">正常</span>'
      :r.issues.map(i=>BADGE_MAP[i.type]||'').join(' ');
    const hints=currentTab==='ok'?'':r.issues.map(i=>
      '<div class="hint-line">&#183; '+i.hint+(i.alt?' &#x2192; '+i.alt:'')+'</div>'
    ).join('');
    const tcTag=tc?'<span style="font-size:11px;color:#888;background:#f0f0f0;padding:1px 6px;border-radius:4px;">'+tc+'</span>':'';
    return '<div class="issue-row">'
      +'<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">'
      +badges
      +'<span style="color:#999;font-size:12px;">'+date+'</span>'
      +'<span style="font-weight:600;">'+acctStr+'</span>'
      +tcTag
      +'<span style="color:#888;flex:1;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+memo+'</span>'
      +'<span style="font-weight:600;white-space:nowrap;">'+amtStr+'</span>'
      +'</div>'+hints+'</div>';
  }).join('');
}

function showTab(tab){
  currentTab=tab;
  ['all','acct','tax','imp','amt','memo','large','dup','ok'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  renderList(allRows);
}

function processRows(rows,name){
  const taxtype=document.querySelector('input[name="taxtype"]:checked').value;
  const invoice=document.querySelector('input[name="invoice"]:checked').value;
  const biz=getBizFlags();
  const format=document.querySelector('input[name="csvformat"]:checked').value;
  currentCfg={taxtype,invoice,biz,format};
  allRows=detectIssues(rows,currentCfg);
  document.getElementById('stat-total').textContent=allRows.length;
  ALL_TYPES.forEach(t=>{
    const el=document.getElementById('stat-'+t);
    if(el)el.textContent=allRows.filter(r=>r.issues.some(i=>i.type===t)).length;
  });
  document.getElementById('filename-label').textContent=name;
  const modeMap={'taxable':'課税事業者','exempt':'免税事業者','both':'両方対応'};
  const bizL=[];
  if(biz.domestic)bizL.push('国内');
  if(biz.export)bizL.push('輸出');
  if(biz.import)bizL.push('輸入');
  document.getElementById('mode-badge').innerHTML='<span class="badge badge-ok">'+modeMap[taxtype]+' / '+bizL.join('・')+'</span>';
  document.getElementById('setup-section').style.display='none';
  document.getElementById('result-section').style.display='block';
  currentTab='all';
  ['all','acct','tax','imp','amt','memo','large','dup','ok'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t==='all');
  });
  renderList(allRows);
}

document.querySelectorAll('input[name="taxtype"]').forEach(el=>el.addEventListener('change',()=>{
  document.getElementById('invoice-setting').style.display=document.querySelector('input[name="taxtype"]:checked').value==='exempt'?'none':'block';
}));
document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>processRows(parseCSV(ev.target.result),f.name);
  rd.readAsText(f,'UTF-8');
});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>processRows(parseCSV(ev.target.result),f.name);
  rd.readAsText(f,'UTF-8');
});

function reset(){
  allRows=[];currentTab='all';
  document.getElementById('file-input').value='';

  document.getElementById('result-section').style.display='none';
}

function exportCSV(){
  const h=['行番号','日付','借方科目','貸方科目','借方金額','税区分','判定','指摘内容'];
  const rows=allRows.map(r=>{
    const judge=r.issues.length===0?'正常':r.issues.map(i=>LABEL_MAP[i.type]||i.type).join(' / ');
    const hint=r.issues.map(i=>i.hint+(i.alt?' → '+i.alt:'')).join(' | ');
    return[r._row,r['日付']||r['取引日']||'',r['借方科目']||r['勘定科目']||'',r['貸方科目']||'',r['借方金額']||r['金額']||'',r['税区分']||r['消費税区分']||'',judge,hint].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv=[h.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='仕訳チェック結果_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
